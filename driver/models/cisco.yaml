prompt_regex: '(?m)^[a-zA-Z0-9_\-\.\x2f\x3a\x40]+[#>]\s*$'
init_commands:
  - "terminal length 0"
backup_command: "show running-config"
noise_filters:
  - '(?m)^! Last configuration change at.*$'
  - '(?m)^! NVRAM config last updated at.*$'
  - '(?m)^Current configuration :.*$'
  - '(?m)^! No configuration change since.*$'
